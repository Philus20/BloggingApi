
spring.datasource.url=jdbc:postgresql://localhost:5432/springDb
spring.datasource.username=philus
spring.datasource.password=philus
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.name=admin
spring.security.user.password=admin


spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# Cache configuration (ConcurrentMapCache by default; use Redis/Caffeine in production)
spring.cache.type=simple
spring.cache.cache-names=posts,users,tags

# Cache AOP logging - demonstrate cache performance
logging.level.com.example.BloggingApi.AOP.CacheLoggingAspect=INFO

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# CORS: allowed origins for web/JavaFX clients (comma-separated)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With,Origin
app.cors.max-age=3600

# JWT: HMAC SHA-256 signing (secret must be at least 32 characters)
app.jwt.secret=BloggingApiJwtSecretKeyForSigningMustBeAtLeast32BytesLong
app.jwt.expiration-ms=3600000

# Google OAuth2 (create credentials at https://console.cloud.google.com/apis/credentials)
# Redirect URI configured in Google must be: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Where to redirect after successful login (default: same-host success page)
app.oauth2.redirect-uri=http://localhost:8080/oauth2/success

# Security (Epic 5): revoked token blacklist cleanup interval (ms)
app.security.revoked-token-cleanup-ms=300000
# Logging for auth events (INFO to see SECURITY_AUTH / SECURITY_TOKEN in logs)
logging.level.com.example.BloggingApi.Security.SecurityEventService=INFO
