# ---------------------------------------------------------------------------
# Data Source
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/springDb
spring.datasource.username=${}
spring.datasource.password=${}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------------------
# GraphQL
# ---------------------------------------------------------------------------
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# ---------------------------------------------------------------------------
# Cache (ConcurrentMapCache by default; use Redis/Caffeine in production)
# ---------------------------------------------------------------------------
spring.cache.type=simple
spring.cache.cache-names=posts,users,tags

# ---------------------------------------------------------------------------
# Swagger / OpenAPI
# ---------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---------------------------------------------------------------------------
# CORS (allowed origins for web/JavaFX clients)
# ---------------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With,Origin
app.cors.max-age=3600

# ---------------------------------------------------------------------------
# JWT (HMAC SHA-256; secret must be at least 32 characters)
# ---------------------------------------------------------------------------


# ---------------------------------------------------------------------------
# Google OAuth2
# Create credentials at https://console.cloud.google.com/apis/credentials
# Redirect URI in Google must be: http://localhost:8080/login/oauth2/code/google


# ---------------------------------------------------------------------------
# Security (revoked token blacklist, auth event logging)
# ---------------------------------------------------------------------------
app.security.revoked-token-cleanup-ms=300000
logging.level.com.example.BloggingApi.Security.SecurityEventService=INFO
logging.level.com.example.BloggingApi.AOP.CacheLoggingAspect=INFO
