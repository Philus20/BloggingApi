
spring.datasource.url=jdbc:postgresql://localhost:5432/springDb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# Cache configuration (ConcurrentMapCache by default; use Redis/Caffeine in production)
spring.cache.type=simple
spring.cache.cache-names=posts,users,tags

# Cache AOP logging - demonstrate cache performance
logging.level.com.example.BloggingApi.AOP.CacheLoggingAspect=INFO

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
